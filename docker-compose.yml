services:
  app:
    build: .
    image: saude-pilates:latest
    container_name: saude-pilates
    restart: unless-stopped
    ports:
      - "3000:3000"
    # ENV_FILE: set to full path to .env if you run compose from another dir (e.g. parent folder)
    env_file:
      - ${ENV_FILE:-.env}
    # Override PORT if your reverse proxy or host expects another port
    # environment:
    #   - PORT=3000
