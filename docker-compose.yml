services:
  app:
    build: .
    image: saude-pilates:latest
    container_name: saude-pilates
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    env_file:
      - ${ENV_FILE:-.env}
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
