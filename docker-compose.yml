services:
  app:
    build: .
    image: saude-pilates:latest
    container_name: saude-pilates
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Env file: set ENV_FILE to full path when running from another dir (e.g. deploy); else .env here
    env_file:
      - ${ENV_FILE:-.env}
    # Override PORT if your reverse proxy or host expects another port
    # environment:
    #   - PORT=3000
