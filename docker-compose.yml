services:
  app:
    build: .
    image: saude-pilates:latest
    container_name: saude-pilates
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Always use .env next to this compose file (run `docker compose` from this directory)
    env_file:
      - .env
    # Override PORT if your reverse proxy or host expects another port
    # environment:
    #   - PORT=3000
