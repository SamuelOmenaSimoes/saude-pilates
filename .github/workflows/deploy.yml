# Deploy to DigitalOcean when code is pushed/merged to main.
# Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PASSWORD (SSH login password)
name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          # port: 22   # uncomment and set if your SSH port is not 22
          script: |
            cd /var/www/saude-pilates-folder/saude-pilates
            export ENV_FILE="/var/www/saude-pilates-folder/saude-pilates/.env"
            git fetch origin
            git checkout main
            git pull origin main
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
          script_stop: true
