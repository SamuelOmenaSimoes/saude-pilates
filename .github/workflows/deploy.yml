# Deploy to DigitalOcean when code is pushed/merged to main.
# Build runs on GitHub; server only pulls the image (no build on server = fast deploy).
# Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PASSWORD (SSH login password)
# GHCR: Make the package public (repo → Packages → saude-pilates → Package settings → Change visibility)
#   or on the server run: echo $GHCR_TOKEN | docker login ghcr.io -u USERNAME --password-stdin
name: Deploy to production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image_sha_tag }}
      image_main: ${{ steps.meta.outputs.image_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: meta
        run: |
          REPO="${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')"
          echo "image_lc=${REPO}:main" >> $GITHUB_OUTPUT
          echo "image_sha_tag=${REPO}:sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_lc }}
            ${{ steps.meta.outputs.image_sha_tag }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          no-cache: true

      - name: Verify image serves this commit
        continue-on-error: true
        run: |
          docker pull ${{ steps.meta.outputs.image_sha_tag }}
          docker run -d --name verify-build -e DATABASE_URL=mysql://x:x@x:3306/x -p 3002:3000 ${{ steps.meta.outputs.image_sha_tag }}
          sleep 6
          resp=$(curl -s http://localhost:3002/api/version || true)
          docker stop verify-build 2>/dev/null || true
          docker rm verify-build 2>/dev/null || true
          echo "$resp" | grep -q "\"sha\":\"${{ github.sha }}\"" && echo "Verified: image serves commit ${{ github.sha }}" || echo "Verify skipped or failed (container may need real DB); deploy will still run."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          command_timeout: 5m
          script: |
            set +e
            APP_DIR="/var/www/saude-pilates-folder"
            if test -f "${APP_DIR}/.env"; then export ENV_FILE="${APP_DIR}/.env"; elif test -f "${APP_DIR}/saude-pilates/.env"; then export ENV_FILE="${APP_DIR}/saude-pilates/.env"; else echo "Error: .env not found at ${APP_DIR}/.env or ${APP_DIR}/saude-pilates/.env"; exit 1; fi
            cd "$APP_DIR" || { echo "Error: APP_DIR not found: $APP_DIR"; exit 1; }
            git fetch origin
            git checkout main
            git pull origin main
            COMPOSE_PROD="$APP_DIR/docker-compose.prod.yml"
            test -f "$COMPOSE_PROD" || { echo "Error: docker-compose.prod.yml not found at $APP_DIR"; exit 1; }
            export IMAGE="${{ needs.build.outputs.image }}"
            docker compose --project-directory "$APP_DIR" -f "$COMPOSE_PROD" down --remove-orphans
            docker stop saude-pilates 2>/dev/null || true
            docker rm saude-pilates 2>/dev/null || true
            docker pull "$IMAGE" || { echo "Error: docker pull failed - production would run old image"; exit 1; }
            echo "--- Using image: $(docker image inspect --format '{{.Id}}' $IMAGE) ---"
            echo "--- Stopping process manager (so old Node app does not respawn) ---"
            pm2 stop saude-pilates 2>/dev/null || true
            pm2 stop all 2>/dev/null || true
            systemctl stop saude-pilates 2>/dev/null || true
            systemctl stop node-saude-pilates 2>/dev/null || true
            supervisorctl stop saude-pilates 2>/dev/null || true
            echo "--- Freeing port 3000 ---"
            ( ss -tlnp 2>/dev/null | grep 3000 && echo "Something on 3000, killing..." && ( pids=$(lsof -ti :3000 2>/dev/null); [ -n "$pids" ] && kill -9 $pids; fuser -k 3000/tcp 2>/dev/null; sleep 3 ) || echo "Port 3000 free" ) || true
            echo "--- Starting container on 3000 ---"
            docker compose --project-directory "$APP_DIR" -f "$COMPOSE_PROD" up -d --force-recreate
            up_rc=$?
            docker image prune -f || true
            if [ "$up_rc" -ne 0 ]; then echo "Warning: docker compose up returned $up_rc"; exit "$up_rc"; fi
            sleep 2
            docker ps --filter name=saude-pilates --format '{{.Status}}' | grep -q Up || { echo "Error: container saude-pilates is not running"; docker logs saude-pilates 2>&1 | tail -30; exit 1; }
            echo "Deploy OK: container is running"
          script_stop: true
