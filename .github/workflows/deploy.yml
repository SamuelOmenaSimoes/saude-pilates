# Deploy to DigitalOcean when code is pushed/merged to main.
# Build runs on GitHub; server only pulls the image (no build on server = fast deploy).
# Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PASSWORD (SSH login password)
# GHCR: Make the package public (repo → Packages → saude-pilates → Package settings → Change visibility)
#   or on the server run: echo $GHCR_TOKEN | docker login ghcr.io -u USERNAME --password-stdin
name: Deploy to production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: meta
        run: |
          echo "image_lc=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]'):main" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_lc }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          command_timeout: 5m
          script: |
            APP_DIR="/var/www/saude-pilates-folder/saude-pilates"
            export ENV_FILE="${APP_DIR}/.env"
            test -f "$ENV_FILE" || { echo "Error: .env not found at $ENV_FILE"; exit 1; }
            cd "$APP_DIR" || { echo "Error: APP_DIR not found: $APP_DIR"; exit 1; }
            git fetch origin
            git checkout main
            git pull origin main
            test -f "$APP_DIR/docker-compose.yml" || { echo "Error: docker-compose.yml not found at $APP_DIR"; exit 1; }
            IMAGE="${{ needs.build.outputs.image }}"
            docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" down
            docker pull "$IMAGE"
            docker tag "$IMAGE" saude-pilates:latest
            docker compose --project-directory "$APP_DIR" -f "$APP_DIR/docker-compose.yml" up -d
            docker image prune -f
          script_stop: true
